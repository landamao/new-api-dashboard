<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - New API Dashboard</title>
<link rel="icon" type="image/jpeg" href="/icon.jpg">
<style>
  :root {
    --pink-50: #fdf2f8;
    --pink-100: #fce7f3;
    --pink-200: #fbcfe8;
    --pink-300: #f9a8d4;
    --pink-400: #f472b6;
    --pink-500: #ec4899;
    --pink-600: #db2777;
    --pink-700: #be185d;
    --rose-50: #fff1f2;
    --rose-100: #ffe4e6;
    --bg: #fff5f7;
    --card: #ffffff;
    --text: #4a1942;
    --text-light: #9f7aea;
    --border: #fce7f3;
    --shadow: 0 4px 20px rgba(236, 72, 153, 0.1);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    background-image: 
      radial-gradient(circle at 20% 50%, rgba(251, 207, 232, 0.3) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(244, 114, 182, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 50% 80%, rgba(249, 168, 212, 0.2) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-container {
    width: 100%;
    max-width: 400px;
    padding: 24px;
  }

  .login-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 40px 32px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    text-align: center;
  }

  .login-card h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--pink-500), var(--pink-700));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .login-card .subtitle {
    color: var(--text-light);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
    text-align: left;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--pink-600);
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--pink-200);
    border-radius: 10px;
    font-size: 14px;
    background: var(--pink-50);
    color: var(--text);
    outline: none;
    transition: all 0.2s;
    font-family: inherit;
  }

  .form-group input:focus {
    border-color: var(--pink-400);
    box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.15);
  }

  .form-group input::placeholder {
    color: var(--pink-300);
  }

  .btn-login {
    width: 100%;
    padding: 14px 24px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    background: linear-gradient(135deg, var(--pink-400), var(--pink-600));
    color: white;
    box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
    margin-top: 8px;
  }

  .btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(236, 72, 153, 0.4);
  }

  .btn-login:active {
    transform: translateY(0);
  }

  .btn-login:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
  }

  .error-msg {
    color: #e11d48;
    font-size: 13px;
    margin-top: 16px;
    min-height: 20px;
  }

  .register-hint {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-light);
    padding-top: 16px;
    border-top: 1px solid var(--pink-100);
  }
  .register-hint a {
    color: var(--pink-500);
    text-decoration: none;
    font-weight: 500;
  }
  .register-hint a:hover {
    text-decoration: underline;
  }

  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-light);
  }

  .footer a {
    color: var(--pink-500);
    text-decoration: none;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  .github-link {
    display: inline-flex;
    align-items: center;
    margin-left: 8px;
    color: var(--text-light);
    text-decoration: none;
    opacity: 0.6;
    transition: all 0.2s;
    vertical-align: middle;
  }
  .github-link:hover {
    opacity: 1;
    color: var(--pink-600);
  }
  .github-link svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  /* 装饰性浮动元素 */
  .decoration {
    position: fixed;
    font-size: 40px;
    opacity: 0.15;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
  }
  .decoration:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
  .decoration:nth-child(2) { top: 20%; right: 15%; animation-delay: 2s; }
  .decoration:nth-child(3) { bottom: 15%; left: 20%; animation-delay: 4s; }
  .decoration:nth-child(4) { bottom: 25%; right: 10%; animation-delay: 1s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }


</style>
</head>
<body>

<div class="decoration">♡</div>
<div class="decoration">♡</div>
<div class="decoration">♡</div>
<div class="decoration">♡</div>

<div class="login-container">
  <div class="login-card">
    <h1>New API Dashboard</h1>
    <p class="subtitle">请使用 New API 账号登录</p>
    
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btnLogin">登录</button>
    </form>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <div class="register-hint">
      还没有账号？<a href="#" id="registerLink" target="_blank">点击注册</a>
    </div>
  </div>
  
  <div class="footer">
    <p>复用 <a href="#" id="apiLink" target="_blank">New API</a> 用户系统
      <a href="https://github.com/landamao/new-api-dashboard" target="_blank" class="github-link" title="GitHub">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </p>
  </div>
</div>

<script>
// ===== 配置：修改为你的 New API 地址 =====
const API_BASE = window.__API_BASE__ || 'http://localhost:3000';
document.getElementById('registerLink').href = API_BASE + '/register';
document.getElementById('apiLink').href = API_BASE;
// ==========================================

async function handleLogin(e) {
  e.preventDefault();
  
  const btn = document.getElementById('btnLogin');
  const errorMsg = document.getElementById('errorMsg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  
  if (!username || !password) {
    errorMsg.textContent = '请输入用户名和密码';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = '登录中...';
  errorMsg.textContent = '';
  
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await resp.json();
    
    if (data.success) {
      // 登录成功，跳转到首页
      window.location.href = '/';
    } else {
      errorMsg.textContent = data.message || '登录失败';
    }
  } catch (err) {
    errorMsg.textContent = '网络错误，请重试';
  } finally {
    btn.disabled = false;
    btn.textContent = '登录';
  }
}

// Enter 键提交
document.getElementById('password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
  }
});
</script>
</body>
</html>
